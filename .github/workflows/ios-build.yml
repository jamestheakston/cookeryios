name: Build App

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Compile and Bundle App Package
        run: |
          # Creates a proper structural app extension folder inside the Payload
          mkdir -p Payload/MyCloudApp.app
          
          # Compiles the app binary directly into that folder
          xcrun -sdk iphoneos swiftc ContentView.swift \
            -target arm64-apple-ios15.0 \
            -parse-as-library \
            -o Payload/MyCloudApp.app/MyCloudApp
          
          # Copies the required metadata plist file into the folder
          cp Info.plist Payload/MyCloudApp.app/Info.plist
          
          # Copies your custom icon assets into the folder
          cp AppIcon@2x.png Payload/MyCloudApp.app/AppIcon@2x.png
          cp AppIcon@3x.png Payload/MyCloudApp.app/AppIcon@3x.png
          
          # Zips the folder into a valid .ipa package
          zip -r MyCloudApp.ipa Payload

      - name: Save Installer
        uses: actions/upload-artifact@v4
        with:
          name: MyUnsignedApp
          path: MyCloudApp.ipa